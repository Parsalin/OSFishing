<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Game — Web Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
input,button,select{font-family:inherit}
a{color:var(--accent);text-decoration:none}

/* ═══════════════════════════════════════
   THEME VARIABLES
   ═══════════════════════════════════════ */
:root{
  --bg-primary:#1a1e1a;--bg-secondary:#222822;--bg-card:#2a302a;--bg-card-hover:#323a32;
  --bg-sidebar:#141814;--bg-sidebar-hover:#1e241e;--bg-input:#222822;--bg-badge:#323a32;
  --text-primary:#e0ddd5;--text-secondary:#a09888;--text-muted:#706860;
  --text-sidebar:#8a8578;--text-sidebar-active:#e0ddd5;--text-on-accent:#fff;
  --accent:#d4884e;--accent-hover:#e09860;--accent-soft:rgba(212,136,78,.15);
  --success:#5aaa6e;--success-soft:rgba(90,170,110,.15);
  --danger:#cc5555;--danger-soft:rgba(204,85,85,.15);
  --warning:#d4aa4e;--warning-soft:rgba(212,170,78,.15);
  --info:#5090d4;--info-soft:rgba(80,144,212,.15);
  --border:#3a423a;--border-light:#323a32;
  --shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.4);
  --rarity-common:#8a8578;--rarity-uncommon:#5aaa6e;--rarity-rare:#5090d4;
  --rarity-epic:#a070d4;--rarity-legendary:#d4884e;
  --topo-stroke:#3a423a;
}
[data-theme="light"]{
  --bg-primary:#f5f0e8;--bg-secondary:#ebe4d6;--bg-card:#ffffff;--bg-card-hover:#faf8f4;
  --bg-sidebar:#2c3e2d;--bg-sidebar-hover:#3a5139;--bg-input:#f0ebe0;--bg-badge:#e8e0d0;
  --text-primary:#2a2520;--text-secondary:#6b6058;--text-muted:#9a8f82;
  --text-sidebar:#d4cfc5;--text-sidebar-active:#f0ebe0;--text-on-accent:#fff;
  --accent:#c4713b;--accent-hover:#a85e30;--accent-soft:rgba(196,113,59,.12);
  --success:#4a8c5c;--success-soft:rgba(74,140,92,.12);
  --danger:#b04040;--danger-soft:rgba(176,64,64,.12);
  --warning:#c49a3b;--warning-soft:rgba(196,154,59,.12);
  --info:#3b7cc4;--info-soft:rgba(59,124,196,.12);
  --border:#d8d0c4;--border-light:#e8e0d4;
  --shadow:0 2px 12px rgba(42,37,32,.08);--shadow-lg:0 8px 32px rgba(42,37,32,.12);
  --rarity-common:#7a7568;--rarity-uncommon:#4a8c5c;--rarity-rare:#3b7cc4;
  --rarity-epic:#8b5cc4;--rarity-legendary:#c4713b;
  --topo-stroke:#d8d0c4;
}

/* ═══════════════════════════════════════
   ANIMATION
   ═══════════════════════════════════════ */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.fade-in{animation:fadeIn .3s ease}

/* ═══════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════ */
body{background:var(--bg-primary);color:var(--text-primary)}
#app{display:flex;min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);position:relative}
.login-wrap::before{content:'';position:absolute;inset:0;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='20' fill='none' stroke='%233a423a' stroke-width='.5'/%3E%3Ccircle cx='30' cy='30' r='10' fill='none' stroke='%233a423a' stroke-width='.5'/%3E%3C/svg%3E");
  background-size:60px 60px}
[data-theme="light"] .login-wrap::before{
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='20' fill='none' stroke='%23d8d0c4' stroke-width='.5'/%3E%3Ccircle cx='30' cy='30' r='10' fill='none' stroke='%23d8d0c4' stroke-width='.5'/%3E%3C/svg%3E")}
.login-card{position:relative;z-index:1;background:var(--bg-card);border-radius:16px;padding:44px 38px;max-width:400px;width:92%;border:1px solid var(--border-light);box-shadow:var(--shadow-lg);text-align:center}
.login-card h1{font-size:24px;font-weight:900;color:var(--text-primary);letter-spacing:-.5px;margin:0 0 4px}
.login-card .sub{font-size:13px;color:var(--text-muted);margin:0 0 28px}
.login-card .fish-icon{font-size:48px;margin-bottom:10px}
.theme-btn-corner{position:absolute;top:16px;right:16px;z-index:2}

/* SIDEBAR */
.sidebar{width:240px;min-height:100vh;background:var(--bg-sidebar);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);flex-shrink:0;transition:width .25s ease;overflow:hidden}
.sidebar.collapsed{width:64px}
.sidebar-brand{padding:20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar.collapsed .sidebar-brand{padding:20px 14px;justify-content:center}
.brand-icon{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-text{overflow:hidden;white-space:nowrap}
.sidebar.collapsed .brand-text{display:none}
.brand-text h2{font-size:15px;font-weight:800;color:var(--text-sidebar-active);letter-spacing:-.3px;margin:0}
.brand-text span{font-size:10px;color:var(--text-sidebar);text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--text-sidebar);font-weight:500;font-size:13px;width:100%;text-align:left;white-space:nowrap;border-left:3px solid transparent;transition:all .15s;font-family:inherit}
.sidebar.collapsed .nav-item{padding:10px 16px;justify-content:center}
.sidebar.collapsed .nav-label{display:none}
.nav-item:hover{background:var(--bg-sidebar-hover)}
.nav-item.active{background:var(--bg-sidebar-hover);color:var(--text-sidebar-active);font-weight:700;border-left-color:var(--accent)}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{flex-shrink:0;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.06)}
.sidebar-footer button{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--text-sidebar);font-size:12px;font-family:inherit;width:100%;white-space:nowrap}
.sidebar-footer button:hover{background:var(--bg-sidebar-hover)}

/* MOBILE */
.mobile-header{display:none;padding:12px 16px;border-bottom:1px solid var(--border-light);background:var(--bg-card);align-items:center;gap:12px}
.mobile-header button{background:none;border:none;cursor:pointer;padding:4px;color:var(--text-primary)}
.mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.mobile-overlay.show{display:block}
.sidebar-mobile{position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .25s ease}
.sidebar-mobile.show{transform:translateX(0)}
@media(max-width:768px){
  .sidebar-desktop{display:none!important}
  .mobile-header{display:flex!important}
  .main-content{padding:20px 16px!important}
  /* Boost small text by 2px on mobile for readability */
  body{font-size:16px}
  .stat-label{font-size:14px!important}
  .card-body,.card,td,th{font-size:14px!important}
  /* Bump anything explicitly small */
  [style*="font-size:10px"]{font-size:12px!important}
  [style*="font-size:11px"]{font-size:13px!important}
  [style*="font-size:12px"]{font-size:14px!important}
  [style*="font-size:13px"]{font-size:15px!important}
}

/* MAIN */
.main-area{flex:1;min-width:0}
.main-content{padding:32px 36px;max-width:1100px}

/* ═══════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════ */

/* Cards */
.card{background:var(--bg-card);border-radius:14px;border:1px solid var(--border-light);box-shadow:var(--shadow);overflow:hidden;transition:all .2s}

/* Stat cards */
.stat-grid{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border-radius:14px;padding:20px 22px;border:1px solid var(--border-light);box-shadow:var(--shadow);flex:1 1 140px;min-width:140px}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;line-height:1.1}
.stat-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}

/* Progress bars */
.progress-wrap{position:relative}
.progress-track{background:var(--bg-input);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s ease}
.progress-label{font-size:11px;color:var(--text-muted);margin-top:3px}

/* Buttons */
.btn{border:none;border-radius:10px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-md{padding:10px 20px;font-size:13px}
.btn-lg{padding:14px 28px;font-size:15px}
.btn-primary{background:var(--accent);color:var(--text-on-accent)}
.btn-secondary{background:var(--bg-badge);color:var(--text-primary);border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-ghost{background:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg-badge)}

/* Inputs */
.input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}

/* Badges */
.rarity-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.rarity-common{color:var(--rarity-common);background:rgba(138,133,120,.12);border:1px solid rgba(138,133,120,.25)}
.rarity-uncommon{color:var(--rarity-uncommon);background:rgba(90,170,110,.12);border:1px solid rgba(90,170,110,.25)}
.rarity-rare{color:var(--rarity-rare);background:rgba(80,144,212,.12);border:1px solid rgba(80,144,212,.25)}
.rarity-epic{color:var(--rarity-epic);background:rgba(160,112,212,.12);border:1px solid rgba(160,112,212,.25)}
.rarity-legendary{color:var(--rarity-legendary);background:rgba(212,136,78,.12);border:1px solid rgba(212,136,78,.25)}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;border-bottom:2px solid var(--border);color:var(--text-muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
td{padding:12px 14px;color:var(--text-primary);white-space:nowrap;border-bottom:1px solid var(--border-light)}
tr:hover td{background:var(--bg-card-hover)}

/* Section header */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-title{font-size:20px;font-weight:800;color:var(--text-primary);letter-spacing:-.3px}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;background:var(--bg-input);border-radius:10px;padding:4px;width:fit-content}
.tab-btn{padding:8px 18px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--bg-card);color:var(--text-primary);box-shadow:var(--shadow)}

/* Grid layouts */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}.card-grid{grid-template-columns:1fr}}

/* Card inner padding */
.card-body{padding:22px}

/* Reward tags */
.reward-tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.reward-tag.accent{background:var(--accent-soft);color:var(--accent)}
.reward-tag.success{background:var(--success-soft);color:var(--success)}

/* Equipment row */
.equip-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.equip-row .label{font-size:12px;color:var(--text-muted)}
.equip-row .value{font-size:13px;font-weight:600;color:var(--text-primary)}

/* Theme toggle switch */
.theme-switch{width:56px;height:30px;border-radius:15px;border:none;cursor:pointer;position:relative;transition:background .2s}
.theme-switch .knob{width:24px;height:24px;border-radius:12px;background:var(--bg-card);position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:12px}

/* Owned badge */
.owned-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--success-soft);color:var(--success)}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.3}
.empty-state .title{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}

/* Rod stats mini grid */
.rod-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--text-secondary);margin-bottom:14px}
.rod-stats strong{color:var(--text-primary)}

/* Journal unknown */
.journal-unknown{opacity:.35}

/* ═══════════════════════════════════════
   EMBED MODE (HUD media prim)
   Full mobile-style layout. No sidebar.
   Big text, big buttons, single column.
   ═══════════════════════════════════════ */
html.embed body{font-size:28px;line-height:1.4;overflow-x:hidden}
html.embed #app{display:block;min-height:100vh}
html.embed .sidebar-desktop,
html.embed .sidebar-mobile,
html.embed .mobile-overlay,
html.embed .mobile-header{display:none!important}
html.embed .main-area{margin:0;width:100%}
html.embed .main-content{padding:30px 24px!important;max-width:100%}
html.embed .login-wrap{min-height:100vh}
html.embed .login-card{padding:50px 40px;max-width:90%;border-radius:20px}
html.embed .login-card h1{font-size:42px}
html.embed .login-card .sub{font-size:24px;margin-bottom:30px}
html.embed .login-card .fish-icon{font-size:60px;margin-bottom:16px}
html.embed .input{padding:20px 22px;font-size:26px;border-radius:12px;margin-bottom:8px}
html.embed .input-label{font-size:20px;margin-bottom:8px}
html.embed .input-group{margin-bottom:20px}
html.embed .btn{padding:16px 24px;font-size:26px;border-radius:12px}
html.embed .btn-sm{padding:12px 18px;font-size:22px}
html.embed .section-header{margin-bottom:20px}
html.embed .section-header h2,
html.embed h1{font-size:38px!important}
html.embed h2{font-size:32px!important}
html.embed h3{font-size:26px!important}
html.embed p{font-size:24px}
html.embed .card{border-radius:14px;margin-bottom:16px}
html.embed .card-body{padding:20px 22px}
html.embed .card-grid{grid-template-columns:1fr 1fr!important;gap:14px}
html.embed .stat-grid{grid-template-columns:1fr 1fr!important;gap:12px}
html.embed .stat-value{font-size:36px}
html.embed .stat-label{font-size:18px}
html.embed .two-col{grid-template-columns:1fr!important;gap:14px}
html.embed .tab-bar{gap:6px;margin-bottom:16px}
html.embed .tab-btn{padding:12px 20px;font-size:24px;border-radius:10px}
html.embed .filter-bar{gap:6px;margin-bottom:14px;flex-wrap:wrap}
html.embed .filter-bar .btn{font-size:20px;padding:10px 16px}
html.embed table{font-size:22px}
html.embed th{padding:12px 14px;font-size:18px}
html.embed td{padding:12px 14px}
html.embed .reward-tag{font-size:18px;padding:6px 12px}
html.embed .progress-wrap{height:12px!important;border-radius:6px!important}
html.embed .nav-embed{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;padding:0 0 16px;border-bottom:2px solid var(--border)}
html.embed .nav-embed-btn{padding:14px 20px;border:none;border-radius:10px;cursor:pointer;font:inherit;font-size:22px;font-weight:600;background:var(--bg-card);color:var(--text-secondary);transition:.15s}
html.embed .nav-embed-btn:hover{background:var(--bg-card-hover)}
html.embed .nav-embed-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG — CHANGE THIS TO YOUR API PATH
// ═══════════════════════════════════════════════
const API_BASE = '/fishing/api/';

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const state = {
  loggedIn: false, page: 'dashboard', sidebarCollapsed: false, mobileOpen: false,
  theme: localStorage.getItem('fishing_theme') || 'dark', loading: false, toast: null,
  // Data from server
  player: null, profile: null, fishInventory: [], baitInventory: [], ownedRods: [],
  quests: { active: [], available: [], completed: [] },
  shop: { bait: [], rods: [] }, leaderboards: {}, collection: null, catchLog: [], titles: [],
  // UI
  fishFilter: 'all', fishSort: 'caught_at', questTab: 'active', shopTab: 'bait', leaderboardTab: 'biggest',
  pairedDevices: [], pairingCode: '',
  mySpots: [], spotStats: { used: 0, limit: 3 },
  myLines: [], rodGallery: [], buffInventory: [], trophyFish: [], pairAttempts: [],
  faqs: [], questionSent: false,
};

// ═══════════════════════════════════════════════
// SVG ICONS
// ═══════════════════════════════════════════════
const icons = {
  dashboard: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>',
  fish: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.46-3.44 6-7 6-3.56 0-7.56-2.54-8.5-6z"/><path d="M2 12h4"/></svg>',

  quest: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>',
  shop: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',

const $ = id => document.getElementById(id);
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  let pendingValue;
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'value') pendingValue = v;
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => { if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  if (pendingValue !== undefined) el.value = pendingValue;
  return el;
};

// Embed auth credentials (populated from URL params in embed mode)
let embedAuth = null;

async function api(action, params = {}) {
  // In embed mode, include the auth token with every request
  if (embedAuth) {
    params._embed_token_id = embedAuth.tokenId;
    params._embed_sig = embedAuth.sig;
    params._embed_ts = embedAuth.ts;
  }
  const body = new URLSearchParams({ action, ...params });
  try {
    const res = await fetch(API_BASE, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, credentials:'include', body });
    return await res.json();
  } catch (e) { console.error('API error:', e); return { success:false, error:'Connection failed' }; }
}

async function loadDashboard() {
  const r = await api('web_dashboard');
  if (r.success) {
    state.profile = r; state.player = r.player;
    // Pop pair flash messages if session was restored from cookie
    if (sessionStorage.getItem('flashPaired') === '1') {
      sessionStorage.removeItem('flashPaired');
      showToast('HUD paired successfully!');
    }
    if (sessionStorage.getItem('flashPairPending') === '1') {
      sessionStorage.removeItem('flashPairPending');
      const claim = await api('web_claim_pending_pair');
      if (claim.success) showToast('HUD paired automatically!');
    }
  }
  const q = await api('web_quest_active');
  if (q.success) state.quests.active = q.quests || [];
  const c = await api('web_collection');
  if (c.success) state.collection = c;
  render();
}

  if (v.success) state.quests.available = v.quests || [];

async function doLogin() {
  const user = $('login-user').value.trim();
  const pass = $('login-pass').value;
  if (!user || !pass) { showLoginError('Enter username and password'); return; }
  const btn = $('login-btn'); if(btn) { btn.disabled=true; btn.textContent='Signing in...'; }
  const r = await api('web_login', { username: user, password: pass });
  if (r.success) {
    state.loggedIn = true;
    state.player = r.player;

    // If user was redirected from /pair before logging in, claim it now
    if (sessionStorage.getItem('flashPairPending') === '1') {
      sessionStorage.removeItem('flashPairPending');
      const claim = await api('web_claim_pending_pair');
      if (claim.success) {
        showToast('HUD paired automatically!');
      } else {
        showToast(claim.error || 'Pairing claim failed', true);
      }
    }
    if (sessionStorage.getItem('flashPaired') === '1') {
      sessionStorage.removeItem('flashPaired');
      showToast('HUD paired successfully!');
    }

    const pendingPair = sessionStorage.getItem('pendingPairCode');
    if (pendingPair) {
      sessionStorage.removeItem('pendingPairCode');
      state.pairingCode = pendingPair;
      state.page = 'settings';
      render();
      loadPageData('settings');
      setTimeout(() => pairHud(), 800);
    } else {
      render();
      loadPageData('dashboard');
    }
  } else {
    showLoginError(r.error || 'Login failed');
    if(btn) { btn.disabled=false; btn.textContent='Sign In'; }
  }
}

function renderSidebar(mobile) {
  const c = state.sidebarCollapsed && !mobile;
  const navItems = [
    {key:'dashboard',label:'Dashboard',icon:icons.dashboard},{key:'fish',label:'Fish Inventory',icon:icons.fish},
    {key:'tackle',label:'Tackle',icon:icons.bait},{key:'rods',label:'Rods',icon:icons.fish},
    {key:'quests',label:'Quests',icon:icons.quest},
    {key:'trophy',label:'Trophy',icon:'🏆'},
    {key:'shop',label:'Shop',icon:icons.shop},{key:'leaderboards',label:'Leaderboards',icon:icons.trophy},
    {key:'map',label:'Grid Map',icon:'🗺️'},
    {key:'journal',label:'Journal',icon:icons.journal},{key:'log',label:'Catch Log',icon:icons.log},
    {key:'help',label:'Help',icon:icons.quest},
    {key:'settings',label:'Settings',icon:icons.settings},
  ];

  // Quest notification indicators
  const hasClaimable = (state.quests.active||[]).some(q=>{
    const progress = q.progress||[];
    return progress.length > 0 && progress.every(pr=>Number(pr.current_count)>=Number(pr.required_qty));
  });
  const hasAvailable = (state.quests.available||[]).length > 0;
  let questBadge = null;
  if (hasClaimable && hasAvailable) questBadge = '!';
  else if (hasClaimable) questBadge = '!';
  else if (hasAvailable) questBadge = '?';

  return h('div',{class:'sidebar'+(c?' collapsed':'')},
    h('div',{class:'sidebar-brand'},h('div',{class:'brand-icon'},'🎣'),h('div',{class:'brand-text'},h('h2',null,'OSFishing'),h('span',null,'Web Portal'))),
    h('nav',{class:'sidebar-nav'},...navItems.map(item=>h('button',{class:'nav-item'+(state.page===item.key?' active':''),onClick:()=>setPage(item.key)},
      h('span',{class:'nav-icon',html:item.icon}),
      h('span',{class:'nav-label'},item.label),
      item.key==='quests' && questBadge ? h('span',{style:{marginLeft:'auto',color:'#ffd700',fontWeight:900,fontSize:'14px',lineHeight:1}},questBadge) : null
    ))),
    h('div',{class:'sidebar-footer'},
      !mobile?h('button',{onClick:()=>{state.sidebarCollapsed=!state.sidebarCollapsed;render();}},h('span',{html:c?icons.expand:icons.collapse}),...(c?[]:[' Collapse'])):null,
      h('button',{onClick:toggleTheme},h('span',{html:state.theme==='dark'?icons.sun:icons.moon}),...(c?[]:[state.theme==='dark'?' Light Mode':' Dark Mode']))
    )
  );
}

// ═══════════════════════════════════════════════
// PAGE: DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard() {
  const p = state.player;
  if (!p) return loadingMsg();
  const pr = state.profile || {};
  const xpToNext = pr.xp_to_next || 0;
  const nextLvl = pr.next_level || (p.level+1);
  const rod = pr.equipped_rod;
  const bait = pr.equipped_bait;
  const col = state.collection || { caught_species:0, total_species:36, completion_pct:0 };
  const activeQ = state.quests.active || [];
  // XP bar: estimate progress within level
  const xpNeeded = xpToNext > 0 ? xpToNext + 100 : 1000; // rough estimate
  const xpInLevel = xpNeeded - xpToNext;
  const catchRate = p.total_casts > 0 ? ((p.total_catches / p.total_casts) * 100).toFixed(1) : '0';

  return h('div',{class:'fade-in'},
    h('div',{style:{marginBottom:'28px'}},
      h('h1',{style:{fontSize:'28px',fontWeight:900,letterSpacing:'-.5px'}},`Welcome back, ${p.display_name}`),
      h('p',{style:{color:'var(--text-secondary)',fontSize:'14px',marginTop:'4px'}},`${pr.active_title||''} — Level ${p.level}`)
    ),
    h('div',{style:{marginBottom:'24px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},
        h('span',{class:'stat-label',style:{marginBottom:0}},'Experience'),
        h('span',{style:{fontSize:'12px',color:'var(--text-secondary)'}},`${p.xp} XP — ${xpToNext} to Level ${nextLvl}`)
      ),
      progressBar(xpInLevel, xpNeeded, 10)
    ),
    h('div',{class:'stat-grid'},
      statCard('Fishing Points', p.fishing_points.toLocaleString(), null, 'var(--accent)'),
      statCard('Total Catches', p.total_catches),
      statCard('Total Casts', p.total_casts, `${catchRate}% catch rate`),
      statCard('Fish Held', pr.held_fish || 0)
    ),
    h('div',{class:'two-col'},
      h('div',{class:'card'},h('div',{class:'card-body'},
        h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'14px'}},'Equipment'),
        equipRow('Rod', rod ? rod.name : 'None'),
        equipRow('Line', pr.equipped_line ? `${pr.equipped_line.name} (${pr.equipped_line.weight_lb}lb)` : 'None'),
        equipRow('Bait', bait ? `${bait.name} (${bait.quantity})` : 'None equipped')
      )),
      h('div',{class:'card'},h('div',{class:'card-body'},
        h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'14px'}},'Active Quests'),
        ...(activeQ.length > 0 ? activeQ.slice(0,3).map((q,i) => {
          const progress = q.progress || [];
          // Sum all requirements for overall progress
          const totalRequired = progress.reduce((s,p)=>s+Number(p.required_qty),0);
          const totalCurrent = progress.reduce((s,p)=>s+Math.min(Number(p.current_count),Number(p.required_qty)),0);
          // Use lowest % requirement as the bottleneck indicator
          const allDone = totalRequired > 0 && totalCurrent >= totalRequired;
          const color = allDone ? '#ffd700' : 'var(--info)';
          return h('div',{style:{marginBottom:i<2?'12px':'0'}},
            h('div',{style:{fontSize:'13px',fontWeight:600,marginBottom:'4px'}},q.title),
            totalRequired > 0 ? progressBar(totalCurrent, totalRequired, 6, color) : null,
            totalRequired > 0 ? h('div',{style:{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}},`${totalCurrent}/${totalRequired}`) : null
          );
        }) : [h('div',{style:{fontSize:'13px',color:'var(--text-muted)'}},'No active quests. Visit the Quest Log to accept one!')])
      ))
    ),
    h('div',{class:'card',style:{marginTop:'18px'}},h('div',{class:'card-body'},
      h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'14px'}},'Collection Progress'),
      progressBar(col.caught_species, col.total_species, 10, 'var(--accent)'),
      h('div',{style:{fontSize:'12px',color:'var(--text-secondary)',marginTop:'6px'}},`${col.caught_species} of ${col.total_species} species discovered (${col.completion_pct||0}%)`)
    ))
  );
}

// PAGE: FISH INVENTORY
// ═══════════════════════════════════════════════
function renderFishInventory() {
  const filter = state.fishFilter, sort = state.fishSort;
  let fish = (state.fishInventory||[]).filter(f => filter === 'all' || f.rarity_name === filter);
  if (sort === 'weight') fish.sort((a,b) => b.weight - a.weight);
  else if (sort === 'value') fish.sort((a,b) => (b.point_value||0) - (a.point_value||0));
  const totalValue = fish.reduce((s,f) => s + (f.point_value||0), 0);

  if (state.fishInventory.length === 0 && !state.loading) return h('div',{class:'fade-in'},h('div',{class:'section-header'},h('h2',{class:'section-title'},'Fish Inventory')),emptyMsg('No fish in your inventory'));

  const filterBtns = ['all','common','uncommon','rare','epic','legendary'].map(r => h('button',{class:'btn btn-sm '+(filter===r?'btn-primary':'btn-secondary'),onClick:()=>{state.fishFilter=r;render();}},r==='all'?'All':r.charAt(0).toUpperCase()+r.slice(1)));
  const sortBtns = ['caught_at','weight','value'].map(s => h('button',{class:'btn btn-sm '+(sort===s?'btn-primary':'btn-secondary'),onClick:()=>{state.fishSort=s;render();}},s==='caught_at'?'Recent':s.charAt(0).toUpperCase()+s.slice(1)));

  return h('div',{class:'fade-in'},
    h('div',{class:'section-header'},h('h2',{class:'section-title'},'Fish Inventory'),h('span',{style:{fontSize:'13px',color:'var(--text-secondary)'},html:`Total value: <strong style="color:var(--accent)">${totalValue} pts</strong>`})),
    h('div',{class:'filter-bar'},...filterBtns,h('div',{style:{marginLeft:'auto',display:'flex',gap:'6px'}},...sortBtns)),
    h('div',{class:'card'},h('div',{class:'table-wrap'},h('table',null,
      h('thead',null,h('tr',null,...['Species','Weight','Rarity','Spot','Bait','Value','Actions'].map(hd=>h('th',null,hd)))),
      h('tbody',null,...fish.map(f=>h('tr',null,
        h('td',{style:{fontWeight:600}},f.species_name),h('td',null,f.weight+' lbs'),h('td',null,rarityBadge(f.rarity_name)),
        h('td',{style:{color:'var(--text-secondary)'}},f.spot_name||'—'),h('td',{style:{color:'var(--text-secondary)'}},f.bait_name||'—'),
        h('td',null,h('span',{style:{fontWeight:700,color:'var(--accent)'}},(f.point_value||0)+' pts')),
        h('td',null,h('button',{class:'btn btn-ghost btn-sm',onClick:()=>sellFish([f.id])},'Sell'),
          h('button',{class:'btn btn-ghost btn-sm',style:{color:'#ffd700'},onClick:()=>saveFish(f.id)},'🏆')
        )
      )))
    ))),
    h('div',{style:{display:'flex',gap:'10px',marginTop:'16px'}},
      h('button',{class:'btn btn-danger btn-sm',onClick:()=>sellByRarity(1)},'Sell All Common'),
      h('button',{class:'btn btn-secondary btn-sm',onClick:()=>sellByRarity(2)},'Sell All Uncommon')
    )
  );
}

// ═══════════════════════════════════════════════
// PAGE: QUESTS
// ═══════════════════════════════════════════════
function renderQuests() {
  const tab = state.questTab;
  const activeQuests = state.quests.active || [];
  const availableQuests = state.quests.available || [];

  // Compute indicators
  const claimable = activeQuests.filter(q=>{
    const p = q.progress||[];
    return p.length > 0 && p.every(pr=>Number(pr.current_count)>=Number(pr.required_qty));
  });
  const hasClaimable = claimable.length > 0;
  const hasAvailable = availableQuests.length > 0;

  const tabBar = h('div',{class:'tab-bar'},
    h('button',{class:'tab-btn'+(tab==='active'?' active':''),onClick:()=>{state.questTab='active';render();}},
      'Active ('+activeQuests.length+')',
      hasClaimable ? h('span',{style:{color:'#ffd700',fontWeight:900,marginLeft:'4px'}},'!') : null
    ),
    h('button',{class:'tab-btn'+(tab==='available'?' active':''),onClick:()=>{state.questTab='available';render();}},
      'Available',
      hasAvailable ? h('span',{style:{color:'#ffd700',fontWeight:900,marginLeft:'4px'}},'?') : null
    ),
    h('button',{class:'tab-btn'+(tab==='completed'?' active':''),onClick:()=>{state.questTab='completed';render();}},'Completed')
  );

  // Sort active quests: claimable first
  const sortedActive = [...activeQuests].sort((a,b)=>{
    const aDone = (a.progress||[]).length>0 && (a.progress||[]).every(p=>Number(p.current_count)>=Number(p.required_qty));
    const bDone = (b.progress||[]).length>0 && (b.progress||[]).every(p=>Number(p.current_count)>=Number(p.required_qty));
    return bDone - aDone;
  });

  // ── Helpers ──
  function repeatBadge(q) {
    if (q.is_daily || q.repeat_type === 'daily')
      return h('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 7px',borderRadius:'4px',background:'rgba(100,160,255,0.18)',color:'#7ec8e3',marginRight:'6px'}},'DAILY');
    if (q.is_weekly || q.repeat_type === 'weekly')
      return h('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 7px',borderRadius:'4px',background:'rgba(100,180,140,0.18)',color:'#81c784',marginRight:'6px'}},'WEEKLY');
    return null;
  }
  function questCardStyle(q) {
    if (q.is_daily || q.repeat_type === 'daily')
      return {marginBottom:'14px',borderLeft:'3px solid #7ec8e3',background:'rgba(100,160,255,0.04)'};
    if (q.is_weekly || q.repeat_type === 'weekly')
      return {marginBottom:'14px',borderLeft:'3px solid #81c784',background:'rgba(100,180,140,0.04)'};
    return {marginBottom:'14px'};
  }
  function tierBadge(q) {
    if (!q.quest_tier || q.quest_tier < 2) return null;
    return h('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 7px',borderRadius:'4px',background:'rgba(212,136,78,0.18)',color:'var(--accent)',marginRight:'4px'}},'T'+q.quest_tier);
  }

  let content;
  if (tab === 'active') {
    const qs = sortedActive;
    content = qs.length ? qs.map(q => {
      const progress = q.progress || [];
      const allDone = progress.length > 0 && progress.every(pr => Number(pr.current_count) >= Number(pr.required_qty));
      return h('div',{class:'card',style:{...questCardStyle(q),border:allDone?'2px solid #ffd700':''}},h('div',{class:'card-body'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}},
          h('div',null,
            h('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'4px'}},
              repeatBadge(q), tierBadge(q),
              h('span',{style:{fontSize:'16px',fontWeight:700}},q.title)
            ),
            h('div',{style:{fontSize:'13px',color:'var(--text-secondary)'}},q.description)
          ),
          h('div',{style:{display:'flex',gap:'6px'}},
            allDone ? h('button',{class:'btn btn-primary btn-sm',style:{fontWeight:700},onClick:()=>claimQuest(q.id)},'✨ Claim!') : null,
            h('button',{class:'btn btn-danger btn-sm',onClick:()=>abandonQuest(q.id)},'Abandon')
          )
        ),
        ...progress.map(pr=>h('div',{style:{marginBottom:'8px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--text-muted)',marginBottom:'4px'}},
            h('span',null,pr.req_description || pr.fish_name || 'Requirement'),
            h('span',{style:{fontWeight:700,color:Number(pr.current_count)>=Number(pr.required_qty)?'var(--success)':''}},`${pr.current_count} / ${pr.required_qty}`)
          ),
          progressBar(pr.current_count, pr.required_qty, 8, Number(pr.current_count)>=Number(pr.required_qty)?'var(--success)':'var(--info)')
        )),
        q.rewards ? h('div',{style:{display:'flex',gap:'6px',marginTop:'12px',flexWrap:'wrap'}},...(Array.isArray(q.rewards)?q.rewards:[]).map(r=>h('span',{class:'reward-tag accent'},typeof r==='string'?r:r.description||'Reward'))) : null
      ));
    }) : [emptyMsg('No active quests')];
  } else if (tab === 'available') {
    const qs = state.quests.available || [];
    content = qs.length ? qs.map(q => h('div',{class:'card',style:questCardStyle(q)},h('div',{class:'card-body'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        h('div',null,
          h('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'4px'}},
            repeatBadge(q), tierBadge(q),
            h('span',{style:{fontSize:'16px',fontWeight:700}},q.title)
          ),
          h('div',{style:{fontSize:'13px',color:'var(--text-secondary)',marginTop:'2px'}},q.description),
          h('div',{style:{fontSize:'11px',color:'var(--text-muted)',marginTop:'4px'}},`Requires Level ${q.min_level}`),
          q.rewards ? h('div',{style:{display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'}},...(Array.isArray(q.rewards)?q.rewards:[]).map(r=>h('span',{class:'reward-tag success'},typeof r==='string'?r:r.description||'Reward'))) : null
        ),
        h('button',{class:'btn btn-primary btn-sm',onClick:()=>acceptQuest(q.id),...(state.player&&state.player.level<q.min_level?{disabled:'true'}:{})},'Accept')
      )
    ))) : [emptyMsg('No quests available at your level')];
  } else {
    const qs = state.quests.completed || [];
    content = qs.length ? [h('div',{class:'card'},h('div',{class:'table-wrap'},h('table',null,
      h('thead',null,h('tr',null,h('th',null,'Quest'),h('th',null,'Type'),h('th',null,'Times'),h('th',null,'Last Completed'))),
      h('tbody',null,...qs.map(q=>h('tr',null,
        h('td',{style:{fontWeight:600}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},
            repeatBadge(q), q.title
          )
        ),
        h('td',null,q.repeat_type==='daily'?'Daily':q.repeat_type==='weekly'?'Weekly':'One-time'),
        h('td',{style:{fontWeight:700,color:'var(--accent)',textAlign:'center'}},
          (q.repeat_type && q.repeat_type !== 'none' && q.times_completed > 1)
            ? '×'+q.times_completed : '—'
        ),
        h('td',{style:{color:'var(--text-muted)',fontSize:'12px'}},q.completed_at ? q.completed_at.slice(0,16) : '—')
      )))
    )))] : [emptyMsg('No completed quests yet')];
  }
  return h('div',{class:'fade-in'},h('div',{class:'section-header'},h('h2',{class:'section-title'},'Quest Log')),tabBar,...content);
}

// PAGE: SHOP
// ═══════════════════════════════════════════════
function renderShop() {

// GRID MAP
// ═══════════════════════════════════════════════
let mapGrids = [];
let mapRegions = [];
let mapSelectedGrid = '';
let mapHopGateway = null;
let mapZoom = 1;
let mapPanX = 0;
let mapPanY = 0;
let mapDragging = false;
let mapDragStart = null;

async function setHomeGrid(gridName) {
  const r = await api('web_set_home_grid', { grid_name: gridName });
  if (r.success) {
    showToast('Home grid set to ' + gridName);
    if (state.profile) state.profile.home_grid = gridName;
    render();
  } else {
    showToast(r.error, true);
  }
}

function buildHopUrl(regionName, spot) {
  if (!mapHopGateway || !regionName) return null;
  const x = spot && spot.pos_x !== null ? Math.round(parseFloat(spot.pos_x)) : 128;
  const y = spot && spot.pos_y !== null ? Math.round(parseFloat(spot.pos_y)) : 128;
  const z = spot && spot.pos_z !== null ? Math.round(parseFloat(spot.pos_z)) : 25;
  return `hop://${mapHopGateway}/${encodeURIComponent(regionName)}/${x}/${y}/${z}`;
}

async function loadMapGrids() {
  const r = await api('grid_list_approved');
  if (r.success) mapGrids = r.grids||[];
  // Default to user's home grid if set, else first
  if (!mapSelectedGrid && mapGrids.length > 0) {
    if (state.profile && state.profile.home_grid) {
      const home = mapGrids.find(g=>g.grid_name === state.profile.home_grid);
      if (home) mapSelectedGrid = home.grid_name;
    }
    if (!mapSelectedGrid) mapSelectedGrid = mapGrids[0].grid_name;
  }
  // Even with no grids selected, try loading regions (will show empty state)
  await loadMapData();
}

let mapShops = [];

async function loadMapData() {
  const r = await api('grid_map', { grid_name: mapSelectedGrid });
  if (r.success) {
    mapRegions = r.regions||[];
    mapHopGateway = r.hop_gateway || null;
  } else {
    mapRegions = [];
    mapHopGateway = null;
  }
  const s = await api('shop_map', { grid_name: mapSelectedGrid });
  if (s.success) mapShops = s.shops||[];
  else mapShops = [];
  // Reset zoom/pan when switching grids
  mapZoom = 1;
  mapPanX = 0;
  mapPanY = 0;
  render();
}

function renderGridMap() {
  // Find bounds for the visual map
  let minX=99999,maxX=-99999,minY=99999,maxY=-99999;
  mapRegions.forEach(r=>{
    if(r.region_x!==null&&r.region_y!==null){
      if(r.region_x<minX)minX=r.region_x;if(r.region_x>maxX)maxX=r.region_x;
      if(r.region_y<minY)minY=r.region_y;if(r.region_y>maxY)maxY=r.region_y;
    }
  });
  // Add padding
  minX-=1;maxX+=1;minY-=1;maxY+=1;
  const rangeX=Math.max(maxX-minX,3);const rangeY=Math.max(maxY-minY,3);

  const gridNick = mapGrids.find(g=>g.grid_name===mapSelectedGrid);
  const displayName = gridNick?(gridNick.nickname||gridNick.grid_name):mapSelectedGrid;

  const homeGrid = state.profile && state.profile.home_grid;
  const sortedGrids = [...mapGrids].sort((a,b)=>{
    if (a.grid_name === homeGrid) return -1;
    if (b.grid_name === homeGrid) return 1;
    return (a.grid_name || '').localeCompare(b.grid_name || '');
  });

  return h('div',null,
    // Grid selector
    h('div',{style:{display:'flex',gap:'10px',alignItems:'center',marginBottom:'16px',flexWrap:'wrap'}},
      h('span',{style:{fontWeight:700,fontSize:'18px'}},'🗺️ Grid Map'),
      h('select',{style:{padding:'6px 12px',borderRadius:'6px',background:'var(--card)',color:'var(--text)',border:'1px solid var(--border)'},
        value:mapSelectedGrid,onChange:e=>{mapSelectedGrid=e.target.value;loadMapData();}},
        ...sortedGrids.map(g=>h('option',{value:g.grid_name},
          (g.grid_name === homeGrid ? '🏠 ' : '') + (g.nickname||g.grid_name)
        ))
      ),
      h('span',{style:{color:'var(--text-secondary)',fontSize:'13px'}},mapRegions.length+' regions'),
      mapSelectedGrid && mapSelectedGrid !== homeGrid
        ? h('button',{class:'btn btn-ghost btn-sm',onClick:()=>setHomeGrid(mapSelectedGrid)},'Set as home')
        : null
    ),
    // Map + sidebar
    h('div',{style:{display:'flex',gap:'16px',flexWrap:'wrap'}},
      // Visual map
      h('div',{class:'card',style:{flex:'1',minWidth:'300px',padding:'0',position:'relative',aspectRatio:'1',overflow:'hidden'}},
        mapRegions.length === 0
          ? h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',minHeight:'300px',color:'var(--text-muted)',textAlign:'center',padding:'24px'}},
              mapGrids.length === 0
                ? 'No public fishing spots have been set up yet anywhere.'
                : 'No public spots on ' + (mapSelectedGrid || 'this grid') + ' yet.'
            )
          : h('div',{
              style:{position:'relative',width:'100%',height:'100%',minHeight:'300px',cursor:mapDragging?'grabbing':'grab',userSelect:'none',overflow:'hidden'},
              onMouseDown:e=>{
                // Don't start drag if clicking on a link
                if (e.target.tagName === 'A' || e.target.closest('a')) return;
                mapDragging = true;
                mapDragStart = {x:e.clientX-mapPanX, y:e.clientY-mapPanY, ox:e.clientX, oy:e.clientY, moved:false};
                render();
              },
              onMouseMove:e=>{
                if (mapDragging && mapDragStart) {
                  const dx = e.clientX - mapDragStart.ox;
                  const dy = e.clientY - mapDragStart.oy;
                  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mapDragStart.moved = true;
                  mapPanX = e.clientX - mapDragStart.x;
                  mapPanY = e.clientY - mapDragStart.y;
                  render();
                }
              },
              onMouseUp:()=>{ mapDragging = false; mapDragStart = null; render(); },
              onMouseLeave:()=>{ mapDragging = false; mapDragStart = null; render(); },
              onWheel:e=>{ e.preventDefault(); const delta = e.deltaY > 0 ? 0.9 : 1.1; mapZoom = Math.max(0.5, Math.min(5, mapZoom * delta)); render(); }
            },
            // Inner pan/zoom container — all dots positioned inside this
            h('div',{style:{position:'absolute',width:'100%',height:'100%',
                            transform:`translate(${mapPanX}px, ${mapPanY}px) scale(${mapZoom})`,
                            transformOrigin:'center center',transition:mapDragging?'none':'transform 0.1s'}},
              ...mapRegions.filter(r=>r.region_x!==null).map(r=>{
                const px=((r.region_x-minX)/rangeX)*100;
                const py=(1-(r.region_y-minY)/rangeY)*100;
                const hasJunk=r.spots.some(s=>parseInt(s.junk_count)>0);
                const hasBuffs=r.spots.some(s=>parseInt(s.active_buffs)>0);
                const spotCount=r.spots.length;
                const waterTypes=[...new Set(r.spots.map(s=>s.water_type))];
                const wtColor=waterTypes.includes('ocean')?'#1a6bc4':waterTypes.includes('lake')?'#2a8ac4':waterTypes.includes('river')?'#4a9ac4':'#5aaa6e';
                const sampleSpot = r.spots[0];
                const hopUrl = buildHopUrl(r.region_name, sampleSpot);
                const labelEl = hopUrl
                  ? h('a',{href:hopUrl,target:'_blank',rel:'noopener',style:{fontSize:'9px',color:'var(--accent)',whiteSpace:'nowrap',marginTop:'2px',textDecoration:'underline',display:'block'},onClick:e=>e.stopPropagation()},r.region_name)
                  : h('div',{style:{fontSize:'9px',color:'var(--text-muted)',whiteSpace:'nowrap',marginTop:'2px'}},r.region_name);
                return h('div',{style:{position:'absolute',left:px+'%',top:py+'%',transform:'translate(-50%,-50%)',textAlign:'center'},
                  title:r.region_name+' ('+r.region_x+','+r.region_y+')\n'+spotCount+' spot(s): '+waterTypes.join(', ')+(hasJunk?' 🎁':'')+(hasBuffs?' ✨':'')},
                  h('div',{style:{width:'14px',height:'14px',borderRadius:'50%',background:wtColor,border:'2px solid var(--text)',margin:'0 auto',position:'relative'}},
                    hasJunk?h('span',{style:{position:'absolute',top:'-8px',right:'-8px',fontSize:'10px'}},'🎁'):null,
                    hasBuffs?h('span',{style:{position:'absolute',bottom:'-8px',right:'-8px',fontSize:'10px'}},'✨'):null
                  ),
                  labelEl
                );
              }),
              // Shop dots
              ...mapShops.filter(s=>s.region_x!==null).map(s=>{
                const px=((parseInt(s.region_x)-minX)/rangeX)*100;
                const py=(1-(parseInt(s.region_y)-minY)/rangeY)*100;
                return h('div',{style:{position:'absolute',left:px+'%',top:py+'%',transform:'translate(-50%,-100%)',cursor:'pointer',textAlign:'center'},
                  title:'🏪 '+s.name+(s.is_system?'\n(System Shop)':'\n(Player Shop)')},
                  h('span',{style:{fontSize:'16px'}},'🏪'),
                  h('div',{style:{fontSize:'8px',color:'var(--text-muted)',whiteSpace:'nowrap'}},s.name)
                );
              })
            ),
            // Zoom controls
            h('div',{style:{position:'absolute',bottom:'10px',right:'10px',display:'flex',flexDirection:'column',gap:'4px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'6px',padding:'4px',boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}},
              h('button',{class:'btn btn-sm btn-ghost',style:{padding:'2px 8px',fontSize:'14px',fontWeight:700},onClick:e=>{e.stopPropagation();mapZoom=Math.min(5,mapZoom*1.25);render();}},'+'),
              h('button',{class:'btn btn-sm btn-ghost',style:{padding:'2px 8px',fontSize:'14px',fontWeight:700},onClick:e=>{e.stopPropagation();mapZoom=Math.max(0.5,mapZoom*0.8);render();}},'−'),
              h('button',{class:'btn btn-sm btn-ghost',style:{padding:'2px 6px',fontSize:'10px'},onClick:e=>{e.stopPropagation();mapZoom=1;mapPanX=0;mapPanY=0;render();},title:'Reset view'},'⊙')
            )
          )
      ),
      // Sidebar: region list
      h('div',{style:{width:'280px',maxHeight:'500px',overflowY:'auto'}},
        ...mapRegions.map(r=>{
          return h('div',{class:'card',style:{marginBottom:'8px',padding:'10px'}},
            h('div',{style:{fontWeight:700,fontSize:'14px',marginBottom:'4px'}},
              r.region_name + (r.region_x!==null ? ' ('+r.region_x+','+r.region_y+')' : '')
            ),
            ...r.spots.map(s=>{
              const junk=parseInt(s.junk_count)||0;
              const buffs=parseInt(s.active_buffs)||0;
              const isActive = (s.is_active==='1' || s.is_active===1);
              const hopUrl = buildHopUrl(r.region_name, s);
              const spotLabel = h('span',null,
                (isActive?'🟢':'🔴')+' ',
                hopUrl
                  ? h('a',{href:hopUrl,target:'_blank',rel:'noopener',style:{color:'var(--accent)',textDecoration:'underline',fontWeight:600}},s.name)
                  : h('span',{style:{fontWeight:600}},s.name),
                ' ',
                h('span',{style:{color:'var(--text-muted)'}},s.water_type),
                junk>0?' 🎁':'',
                buffs>0?' ✨':''
              );
              return h('div',{style:{fontSize:'12px',color:'var(--text-secondary)',padding:'2px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                spotLabel,
                s.owner_name?h('span',{style:{fontSize:'10px',color:'var(--text-muted)'}},s.owner_name):null
              );
            })
          );
        })
      )
    ),
    // Legend
    h('div',{style:{display:'flex',gap:'16px',marginTop:'12px',fontSize:'12px',color:'var(--text-muted)',flexWrap:'wrap'}},
      h('span',null,'🟢 Active  🔴 Inactive'),
      h('span',null,'🎁 Has junk loot'),
      h('span',null,'✨ Active buffs'),
      h('span',null,h('span',{style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'50%',background:'#5aaa6e',marginRight:'3px'}}), 'Pond'),
      h('span',null,h('span',{style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'50%',background:'#4a9ac4',marginRight:'3px'}}), 'River'),
      h('span',null,h('span',{style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'50%',background:'#2a8ac4',marginRight:'3px'}}), 'Lake'),
      h('span',null,h('span',{style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'50%',background:'#1a6bc4',marginRight:'3px'}}), 'Ocean')
    )
  );
}

// ═══════════════════════════════════════════════
// PAGE: TROPHY / SAVED FISH
// ═══════════════════════════════════════════════
function renderTrophy() {
  const fish = state.trophyFish || [];
  const rarityColors = {common:'#9D9D9D',uncommon:'#1EFF00',rare:'#0070FF',epic:'#A335EE',legendary:'#FF8000'};

  return h('div',{class:'fade-in'},
    h('div',{class:'section-header'},
      h('h2',{class:'section-title'},'🏆 Trophy Collection'),
      h('span',{style:{fontSize:'13px',color:'var(--text-muted)'}},fish.length+' saved fish')
    ),
    h('p',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'20px'}},
      'Your prized catches. Save fish from your inventory, add notes, and mount them on wall plaques in-world.'
    ),
    fish.length === 0 ? emptyMsg('No trophy fish yet. Click 🏆 on a fish in your inventory to save it here.') :
    h('div',{class:'card-grid'},
      ...fish.map(f => {
        const rarityColor = rarityColors[f.rarity_name] || '#9D9D9D';
        const date = f.caught_at ? f.caught_at.slice(0,10) : '—';
        return h('div',{class:'card',style:{borderTop:'3px solid '+rarityColor}},
          h('div',{class:'card-body'},
            // Species + rarity
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}},
              h('div',null,
                h('div',{style:{fontSize:'16px',fontWeight:700}},f.species_name),
                h('div',{style:{fontSize:'12px',fontWeight:700,color:rarityColor}},f.rarity_name.toUpperCase())
              ),
              h('div',{style:{fontSize:'22px',fontWeight:800,color:'var(--accent)',textAlign:'right'}},
                f.weight.toFixed(2)+' lb'
              )
            ),
            // Details
            h('div',{style:{fontSize:'11px',color:'var(--text-muted)',lineHeight:'1.8',marginBottom:'10px'}},
              h('div',null,'📍 '+( f.caught_region||'Unknown')),
              h('div',null,'📅 '+date),
              f.bait_name ? h('div',null,'🪱 '+f.bait_name) : null
            ),
            // Note
            h('div',{style:{
              background:'var(--bg-input)',borderRadius:'6px',padding:'8px 10px',
              fontSize:'12px',color:f.note?'var(--text-secondary)':'var(--text-muted)',
              fontStyle:f.note?'normal':'italic',marginBottom:'12px',minHeight:'32px',
              cursor:'pointer'
            },onClick:()=>updateTrophyNote(f.saved_id),title:'Click to edit note'},
              f.note || 'Click to add a note...'
            ),
            // Actions
            h('div',{style:{display:'flex',gap:'8px'}},
              h('button',{class:'btn btn-ghost btn-sm',onClick:()=>returnFishToInventory(f.saved_id)},'↩ Return'),
              h('div',{style:{fontSize:'10px',color:'var(--text-muted)',marginLeft:'auto',alignSelf:'center'}},
                'ID #'+f.fish_id
              )
            )
          )
        );
      })
    )
  );
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
const pageRenderers = { dashboard:renderDashboard, fish:renderFishInventory, tackle:renderTackle, rods:renderRodGallery, quests:renderQuests, shop:renderShop, leaderboards:renderLeaderboards, map:renderGridMap, trophy:renderTrophy, journal:renderJournal, log:renderCatchLog, help:renderHelp, settings:renderSettings };

function render() {
  setTheme(state.theme);
  const app = $('app');
  if (!state.loggedIn) { renderLogin(); return; }
  app.innerHTML = '';

  const isEmbed = document.documentElement.classList.contains('embed');
  const pageRenderer = pageRenderers[state.page] || renderDashboard;

  if (isEmbed) {
    // Embed mode: inline nav bar at top, no sidebar
    const embedNav = h('div',{class:'nav-embed'},
      ...[ ['dashboard','Home'], ['fish','Fish'], ['tackle','Tackle'], ['rods','Rods'],
           ['quests','Quests'], ['trophy','Trophy'], ['shop','Shop'],
           ['leaderboards','Ranks'], ['map','Map'], ['journal','Journal'],
           ['log','Log'], ['help','Help'], ['settings','Settings']
      ].map(([k,l]) => h('button',{
        class:'nav-embed-btn'+(state.page===k?' active':''),
        onClick:()=>{ state.page=k; render(); loadPageData(k); }
      },l))
    );
    const content = h('div',{class:'main-content'}, embedNav, pageRenderer());
    app.appendChild(content);
  } else {
    // Normal desktop mode
    const sidebarDesktop = h('div',{class:'sidebar-desktop'},renderSidebar(false));
    const overlay = h('div',{class:'mobile-overlay'+(state.mobileOpen?' show':''),onClick:()=>{state.mobileOpen=false;render();}});
    const sidebarMobile = h('div',{class:'sidebar-mobile'+(state.mobileOpen?' show':'')},renderSidebar(true));
    const mobileHeader = h('div',{class:'mobile-header'},h('button',{onClick:()=>{state.mobileOpen=true;render();},html:icons.menu}),h('span',{style:{fontWeight:700}},'Fishing Game'));
    const mainContent = h('div',{class:'main-area'}, mobileHeader, h('div',{class:'main-content'}, pageRenderer()));

    app.appendChild(sidebarDesktop);
    app.appendChild(overlay);
    app.appendChild(sidebarMobile);
    app.appendChild(mainContent);
  }

  // Toast notification
  if (state.toast) {
    const toast = h('div',{style:{position:'fixed',bottom:'20px',right:'20px',padding:'12px 20px',borderRadius:'10px',background:state.toast.isError?'var(--danger)':'var(--success)',color:'#fff',fontSize:'13px',fontWeight:600,boxShadow:'var(--shadow-lg)',zIndex:1000,animation:'fadeIn .2s ease'}},state.toast.msg);
    app.appendChild(toast);
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

// Check URL for ?pair=XXX-XXX param and auto-fill / auto-claim
// Also check for ?page=X to navigate directly (used by HUD media panel)
// Also check for ?embed=1 for compact mode
(function() {
  const params = new URLSearchParams(window.location.search);

  // Embed mode — compact layout for HUD media prim
  if (params.get('embed') === '1') {
    document.documentElement.classList.add('embed');
  }

  // Auto-auth via token (HUD passes token_id, sig, and ts)
  const tokenId = params.get('token_id');
  const sig = params.get('sig');
  const ts = params.get('ts');
  if (tokenId && sig) {
    // Store credentials for all subsequent API calls
    embedAuth = { tokenId, sig, ts: ts || '0' };

    // Show loading instead of login form while we auto-authenticate
    state.loading = true;
    document.getElementById('app').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text-muted);font-size:14px">Connecting...</div>';

    // Try auto-login via the pairing token
    (async function() {
      const r = await api('web_auto_login', { token_id: tokenId, sig: sig, ts: ts || '0' });
      if (r.success) {
        state.loggedIn = true;
        state.player = r.player;
        state.loading = false;
        const pageParam = params.get('page');
        if (pageParam) state.page = pageParam;
        render();
        loadPageData(state.page);
      } else {
        // Auto-login failed — show login form
        state.loading = false;
        embedAuth = null;
        render();
      }
    })();
    return; // Skip normal init — auto-login handles render
  }

  const pairCode = params.get('pair');
  if (pairCode) {
    state.pairingCode = pairCode;
    state.page = 'settings';
    sessionStorage.setItem('pendingPairCode', pairCode);
    history.replaceState({}, '', window.location.pathname);
  }
  // Flash: came back from /pair after successful auto-pair
  if (params.get('paired') === '1') {
    sessionStorage.setItem('flashPaired', '1');
    history.replaceState({}, '', window.location.pathname);
  }
  // Flash: was redirected from /pair pre-login; need to login then re-claim
  if (params.get('pair_pending') === '1') {
    sessionStorage.setItem('flashPairPending', '1');
    history.replaceState({}, '', window.location.pathname);
  }
  const pageParam = params.get('page');
  if (pageParam) {
    const validPages = ['dashboard','fish','tackle','rods','quests','shop','leaderboards','journal','log','settings'];
    if (validPages.includes(pageParam)) {
      state.page = pageParam;
    }
    history.replaceState({}, '', window.location.pathname);
  }
})();

render();
</script>
